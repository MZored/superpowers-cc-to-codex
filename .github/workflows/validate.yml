name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_VERSION: 2.1.123
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm install -g @anthropic-ai/claude-code@${{ env.CLAUDE_CODE_VERSION }}
      - run: npm test
      - run: npm run validate:schemas
      - run: node scripts/check-upstream-superpowers.mjs
      - run: claude plugin validate .claude-plugin/plugin.json
